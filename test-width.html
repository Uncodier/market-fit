<!DOCTYPE html>
<html>
<head>
<style>
  .parent {
    width: 400px;
    padding: 32px;
    background: #ccc;
    box-sizing: border-box;
  }
  .child {
    width: 100%;
    margin-left: -32px;
    margin-right: -32px;
    background: #f00;
    height: 50px;
  }
  .child-auto {
    margin-left: -32px;
    margin-right: -32px;
    background: #0f0;
    height: 50px;
    margin-top: 10px;
  }
</style>
</head>
<body>
  <div class="parent">
    <div class="child">w-full (100%)</div>
    <div class="child-auto">w-auto</div>
  </div>
</body>
</html>
